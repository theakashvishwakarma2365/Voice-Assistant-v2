; VoiceDesk ESP32 — PlatformIO project config
; Flash with: pio run --target upload

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serial monitor
monitor_speed = 115200

; Partition scheme — 4MB with large app space
board_build.partitions = huge_app.csv

; Libraries
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    gilmaimon/ArduinoWebsockets @ ^0.5.4
    bblanchon/ArduinoJson @ ^7.0.4

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM
    ; Tell TFT_eSPI to use our custom User_Setup.h
    -DUSER_SETUP_LOADED
    -DILI9486_DRIVER
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_MISO=19
    -DSPI_FREQUENCY=27000000
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DSMOOTH_FONT

; Upload speed
upload_speed = 921600
